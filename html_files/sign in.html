    <body>
        
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: "Open Sans";
            background-color:  rgb(232, 232, 232);
        }
        section{
            position: relative;
            height: 100vh;
            width: 100%;
           
        
            background-position-y: center center;
        }
        .form-container{
            position:absolute;
            top: 50%;
            left: 50%;

            padding: 50px 30px;
            border-radius: 10px;
            box-shadow:7px 7px 60px #353434;
         
          
  
          

            
        }
        h1{
            text-transform: uppercase;
            font-size: 2em;
            text-align: center;
            margin-bottom: 2em;
        }
        .control input{
            width: 100%;
            display: block;
            padding: 9px;
            color: #222;
            border: none;
            outline: none;
            margin: 1em 0;
           


        }
        .control input[type="submit"]{
            background: crimson;
            color: #fff;
            text-transform: uppercase;
            font: 1, 2em;
            opacity: .7;
            transition: opacity .3s ease;

        }
        .control input[type="submit"]:hover{
            opacity: 1;

        }
        .link{
            text-align: center;
        }
        .link a{
            text-decoration: none;
            color: #ffffff;
            opacity: .6;
            transition: opacity .3s ease;
        }
        .link a:hover{
            opacity: 1;
        }
        nav {
            display: flex;
            justify-content: space-around ;
            align-items: center;
            padding: 15px 30px;
            background-color: rgb(212, 147, 50);
            height: 60px;
        }
        .logo img{
           width: 150px;
          
        }
        .nav-links a  {
            margin-left: 60px;
            text-decoration: none;
            color: rgb(244, 235, 235);    
        }
        .nav-links a:hover{
            border-bottom: 3px solid;
            color: rgb(47, 46, 44);
        }
        h1{
            text-align: center;
            margin-top: 30px;
            font-family: 'Times New Roman', Times, serif;
            
        }
        .about-content{
            width: 90%;
            margin: 0 auto;
            text-align: center;
        }
        .about-content .definition{
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 50px;

            border: 1px solid;
            border-radius: 30px;
        
        }
        .definition .card img{
            height: 5%;
            width: 20%;
            margin-top: 10px;
        }
        .content p{
            margin-top: 30px;
            margin-bottom: 30px;
          
        }
                </style>

        <section>

                        <input type="text" name="name" id="name">
                        </div>
                        <div class="control">
                            <label for="psw">Password</label>
                            <input type="password" name="psw" id="psw">
                            </div>
                            <span><input type="checkbox"> Remember me.</span>
                            <div class="control">
                                <input type="submit" value="Login">
                            </div>
                            </form>

                        </div>
                    </div>
